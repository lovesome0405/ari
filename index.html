<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>마루 | 서울 전통문화 AI 가이드</title>
  <meta name="description" content="마루, 외국인을 위한 서울 전통문화 AI 가이드">
  <meta name="theme-color" content="#07111f">
  <meta property="og:title" content="마루 | MARU">
  <meta property="og:description" content="외국인을 위한 서울 전통문화 AI 가이드 · Seoul Heritage Guide for Global Travelers">
  <meta property="og:type" content="website">
  <meta property="og:locale" content="ko_KR">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="home">
  <div class="app-shell">
    <header class="app-header">
      <a class="brand" href="index.html" aria-label="마루 홈">
        <span class="brand-mark">MR</span>
        <span><strong>마루</strong><small>Seoul Heritage Guide</small></span>
      </a>
      <button class="header-pill" type="button" data-language-trigger>KR</button>
    </header>

    <main class="app-main onboarding-main">
      <section class="home-time-hero" data-home-time-hero aria-label="서울 시간대 추천 이미지">
        <div class="image-frame image-placeholder home-time-image">
          <div class="image-placeholder-content">
            <strong>MARU</strong>
            <small>문화 이미지 준비 중</small>
          </div>
        </div>
        <div class="home-time-copy">
          <span>서울 시간대 추천</span>
          <h1>외국인을 위한 서울 전통문화 AI 가이드</h1>
          <p>궁궐, 한옥, 사찰, 역사 공간을 여행자의 시간·날씨·관심사에 맞춰 이야기 흐름으로 추천합니다.</p>
        </div>
      </section>

      <section class="language-card" aria-label="언어 선택">
        <div class="language-grid">
          <button class="language-choice is-active" type="button" data-language="ko">한국어</button>
          <button class="language-choice" type="button" data-language="en">English</button>
          <button class="language-choice" type="button" data-language="ja">日本語</button>
          <button class="language-choice" type="button" data-language="zh">中文</button>
        </div>
        <div class="selection-confirm" data-language-confirm>한국어로 시작합니다.</div>
      </section>

      <section class="quick-action-list" aria-label="빠른 시작">
        <a class="quick-action" href="routes.html">
          <span class="quick-symbol route-symbol"></span>
          <strong>오늘 추천 코스</strong>
          <small>대표 스토리 코스 먼저 보기</small>
        </a>
        <a class="quick-action" href="weather.html">
          <span class="quick-symbol rain-symbol"></span>
          <strong>비 오는 날 코스</strong>
          <small>실내 중심 대체 코스</small>
        </a>
        <a class="quick-action" href="support.html#traveler-support">
          <span class="quick-symbol support-symbol"></span>
          <strong>여행자 지원</strong>
          <small>긴급·분실·번역 도움</small>
        </a>
      </section>

      <section class="more-links home-more-links">
        <a href="about.html">서비스 소개</a>
        <a href="culture-data.html">공공데이터 활용 보기</a>
      </section>
    </main>

    <div class="bottom-cta">
      <a class="button button-primary button-block" href="planner.html">시작하기</a>
    </div>

    <nav class="bottom-tab" aria-label="하단 탭">
      <a href="index.html" data-tab="home"><span class="tab-icon home-icon"></span><strong>홈</strong></a>
      <a href="planner.html" data-tab="recommend"><span class="tab-icon recommend-icon"></span><strong>추천</strong></a>
      <a href="map.html" data-tab="map"><span class="tab-icon map-icon"></span><strong>지도</strong></a>
      <a href="support.html" data-tab="support"><span class="tab-icon support-icon"></span><strong>지원</strong></a>
      <a href="passport.html" data-tab="passport"><span class="tab-icon save-icon"></span><strong>저장</strong></a>
    </nav>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <script src="app.js"></script>
</body>
</html>
