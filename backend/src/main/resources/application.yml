server:
  port: ${PORT:8080}

spring:
  application:
    name: maru-backend
  datasource:
    url: ${MARU_DB_URL:jdbc:mysql://localhost:3306/maru?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=utf8}
    username: ${MARU_DB_USERNAME:root}
    password: ${MARU_DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: false

maru:
  cors:
    allowed-origins: ${MARU_ALLOWED_ORIGINS:http://localhost:4173,http://127.0.0.1:4173,https://lovesome0405.github.io}
  external:
    openai:
      api-key: ${OPENAI_API_KEY:}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
    tour-api:
      service-key: ${TOUR_API_SERVICE_KEY:}
      base-url: ${TOUR_API_BASE_URL:https://apis.data.go.kr/B551011/KorService2}
    seoul-open-data:
      api-key: ${SEOUL_OPEN_DATA_API_KEY:}
      base-url: ${SEOUL_OPEN_DATA_BASE_URL:http://openapi.seoul.go.kr:8088}
