server:
  port: ${PORT:8080}

spring:
  application:
    name: maru-backend
  servlet:
    multipart:
      max-file-size: ${MARU_MULTIPART_MAX_FILE_SIZE:20MB}
      max-request-size: ${MARU_MULTIPART_MAX_REQUEST_SIZE:20MB}
  datasource:
    url: ${MARU_DB_URL:jdbc:mysql://localhost:3306/maru?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=utf8}
    username: ${MARU_DB_USERNAME:root}
    password: ${MARU_DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
    show-sql: false

maru:
  cors:
    allowed-origins: ${MARU_ALLOWED_ORIGINS:http://localhost:4173,http://127.0.0.1:4173,https://lovesome0405.github.io}
  external:
    openai:
      api-key: ${OPENAI_API_KEY:}
      base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
    tour-api:
      service-key: ${TOUR_API_SERVICE_KEY:}
      base-url: ${TOUR_API_BASE_URL:https://apis.data.go.kr/B551011/KorService2}
    seoul-open-data:
      api-key: ${SEOUL_OPEN_DATA_API_KEY:}
      base-url: ${SEOUL_OPEN_DATA_BASE_URL:http://openapi.seoul.go.kr:8088}
  ai-photo:
    enabled: ${MARU_AI_PHOTO_ENABLED:true}
    model: ${MARU_AI_PHOTO_MODEL:gpt-image-1.5}
    quality: ${MARU_AI_PHOTO_QUALITY:high}
    output-format: ${MARU_AI_PHOTO_OUTPUT_FORMAT:png}
    background: ${MARU_AI_PHOTO_BACKGROUND:opaque}
    input-fidelity: ${MARU_AI_PHOTO_INPUT_FIDELITY:high}
    preferred-long-edge: ${MARU_AI_PHOTO_PREFERRED_LONG_EDGE:1536}
    max-upload-bytes: ${MARU_AI_PHOTO_MAX_UPLOAD_BYTES:15000000}
  auth:
    jwt:
      secret: ${MARU_JWT_SECRET:change-this-local-dev-jwt-secret-to-a-long-random-value}
      issuer: ${MARU_JWT_ISSUER:maru-backend}
      access-token-minutes: ${MARU_JWT_ACCESS_TOKEN_MINUTES:720}
    google:
      enabled: ${MARU_GOOGLE_ENABLED:true}
      web-client-id: ${MARU_GOOGLE_WEB_CLIENT_ID:}
