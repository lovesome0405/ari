<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>문화여행 기록 | 마루</title>
  <meta name="description" content="마루에서 저장한 코스와 전통문화 스탬프를 확인하는 문화여행 기록">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="passport">
  <div class="app-shell">
    <header class="app-header">
      <a class="brand" href="index.html"><span class="brand-mark">MR</span><span><strong>마루</strong><small>문화여행 기록</small></span></a>
      <a class="header-pill" href="routes.html">새 코스</a>
    </header>

    <main class="app-main">
      <section class="page-title-card">
        <p class="eyebrow">Saved Routes</p>
        <h1>나의 문화여행 기록</h1>
        <p>방문한 전통문화 코스를 저장하고 스탬프로 기록합니다.</p>
      </section>

      <section class="saved-route-card" data-saved-route>
        <span>저장한 코스</span>
        <strong>아직 저장한 코스가 없습니다.</strong>
        <a class="button button-secondary button-block" href="routes.html">추천 코스에서 선택하기</a>
      </section>

      <section class="mobile-card">
        <h2>문화 스탬프</h2>
        <div class="stamp-grid" data-passport-stamps></div>
      </section>

      <section class="today-route-card">
        <span>다음 추천</span>
        <h2>숨은 소리문화와 한옥 골목 코스</h2>
        <p>궁궐문화 다음에는 한옥과 국악의 조용한 분위기를 경험해 보세요.</p>
        <a class="button button-primary button-block" href="route-detail.html?id=hidden-sounds-hanok-streets">코스 보기</a>
      </section>
    </main>

    <nav class="bottom-tab" aria-label="하단 탭">
      <a href="index.html" data-tab="home"><span class="tab-icon home-icon"></span><strong>홈</strong></a>
      <a href="planner.html" data-tab="recommend"><span class="tab-icon recommend-icon"></span><strong>추천</strong></a>
      <a href="map.html" data-tab="map"><span class="tab-icon map-icon"></span><strong>지도</strong></a>
      <a href="support.html" data-tab="support"><span class="tab-icon support-icon"></span><strong>지원</strong></a>
      <a href="passport.html" data-tab="passport"><span class="tab-icon save-icon"></span><strong>저장</strong></a>
    </nav>
  </div>
  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <script src="app.js"></script>
</body>
</html>
