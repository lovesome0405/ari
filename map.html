<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>지도 | 마루</title>
  <meta name="description" content="선택한 코스의 지도와 네이버지도, 카카오맵, Google Maps 링크">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="map">
  <div class="app-shell">
    <header class="app-header">
      <a class="brand" href="index.html"><span class="brand-mark">MR</span><span><strong>마루</strong><small>지도 길찾기</small></span></a>
      <a class="header-pill" href="routes.html">코스 변경</a>
    </header>

    <main class="app-main">
      <section class="page-title-card">
        <p class="eyebrow">Route Map</p>
        <h1 data-map-route-title>선택한 코스</h1>
        <p>현재 위치를 허용하면 가까운 서울 전통문화 장소를 거리순으로 추천합니다. 위치 정보는 저장하지 않으며, 선택한 지도 서비스로 코스와 이동 순서도 열 수 있습니다.</p>
      </section>

      <section class="map-card">
        <div class="map-canvas" data-map-canvas aria-label="지도 목업"></div>
      </section>

      <section class="mobile-card crowd-panel" data-map-crowd-panel></section>

      <section class="map-service-card" data-map-service-panel></section>

      <a class="button button-map button-block" href="#" target="_blank" rel="noopener" data-map-open-route>선택한 지도에서 열기</a>

      <section class="mobile-card nearby-location-card" data-nearby-section>
        <h2 data-nearby-title>내 주변 전통문화 장소</h2>
        <p class="nearby-notice" data-nearby-notice>위치 정보는 가까운 장소 추천에만 사용되며 저장되지 않습니다.</p>
        <button class="button button-primary button-block" type="button" data-nearby-location-button>현재 위치로 가까운 코스 찾기</button>
        <p class="nearby-status" data-nearby-status aria-live="polite"></p>
        <div class="nearby-results" data-nearby-results></div>
      </section>

      <section class="mobile-card">
        <h2>이동 순서</h2>
        <ol class="timeline-list" data-map-timeline></ol>
      </section>

      <section class="action-grid">
        <button class="action-card" type="button" data-toast="적게 걷는 이동은 선택한 지도 서비스의 경로 옵션에서 확인하세요.">적게 걷는 루트</button>
        <button class="action-card" type="button" data-toast="비 오는 날 실내 코스 조건이 선택되었습니다.">비 오는 날 실내 코스</button>
      </section>
    </main>

    <nav class="bottom-tab" aria-label="하단 탭">
      <a href="index.html" data-tab="home"><span class="tab-icon home-icon"></span><strong>홈</strong></a>
      <a href="planner.html" data-tab="recommend"><span class="tab-icon recommend-icon"></span><strong>추천</strong></a>
      <a href="map.html" data-tab="map"><span class="tab-icon map-icon"></span><strong>지도</strong></a>
      <a href="support.html" data-tab="support"><span class="tab-icon support-icon"></span><strong>지원</strong></a>
      <a href="passport.html" data-tab="passport"><span class="tab-icon save-icon"></span><strong>저장</strong></a>
    </nav>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
