<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>여행자 지원 | 마루</title>
  <meta name="description" content="외국인 여행자를 위한 긴급, 분실, 관광 안내, 안전, 번역 도움">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="style.css">
</head>
<body data-page="support">
  <div class="app-shell">
    <header class="app-header">
      <a class="brand" href="index.html"><span class="brand-mark">MR</span><span><strong>마루</strong><small>여행자 지원</small></span></a>
      <button class="header-pill" type="button" data-support-jump="airport">지원 목록</button>
    </header>

    <main class="app-main">
      <section class="emergency-card">
        <p class="eyebrow">Emergency</p>
        <h1>긴급 상황인가요?</h1>
        <p>필요한 도움을 빠르게 선택하세요.</p>
        <div class="emergency-grid">
          <button type="button" data-support-jump="emergency">비상 연락처</button>
          <button type="button" data-support-jump="tmoney">교통카드</button>
          <button type="button" data-support-jump="translation">번역 도움</button>
          <button type="button" data-support-jump="rainy">우천 대체</button>
        </div>
      </section>

      <section class="support-list" id="traveler-support" data-support-list></section>
    </main>

    <nav class="bottom-tab" aria-label="하단 탭">
      <a href="index.html" data-tab="home"><span class="tab-icon home-icon"></span><strong>홈</strong></a>
      <a href="planner.html" data-tab="recommend"><span class="tab-icon recommend-icon"></span><strong>추천</strong></a>
      <a href="map.html" data-tab="map"><span class="tab-icon map-icon"></span><strong>지도</strong></a>
      <a href="support.html" data-tab="support"><span class="tab-icon support-icon"></span><strong>지원</strong></a>
      <a href="passport.html" data-tab="passport"><span class="tab-icon save-icon"></span><strong>저장</strong></a>
    </nav>
  </div>
  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <script src="app.js"></script>
</body>
</html>
